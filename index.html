<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bible Journey Challenge</title>
  <style>
    :root {
      --navy: #0d1a2d;
      --navy-2: #152641;
      --gold: #c89b3c;
      --gold-2: #f1d58a;
      --olive: #52663b;
      --olive-2: #7f8f5b;
      --sand: #b99363;
      --copper: #9a5634;
      --parchment: #f2e3bf;
      --parchment-2: #dfc99a;
      --ink: #253044;
      --muted: #6b5f4c;
      --ivory: #fff8e8;
      --line: rgba(37, 48, 68, 0.18);
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.32);
      --radius: 8px;
      --focus: 0 0 0 3px rgba(241, 213, 138, 0.45);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--navy);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ivory);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 20% 8%, rgba(200, 155, 60, 0.18), transparent 28rem),
        linear-gradient(135deg, rgba(13, 26, 45, 0.95), rgba(21, 38, 65, 0.94)),
        var(--navy);
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: 0.24;
      background-image:
        linear-gradient(rgba(255, 248, 232, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 248, 232, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    summary:focus-visible,
    [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .screen {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .home-screen {
      display: grid;
      min-height: 100vh;
      align-items: center;
      padding-bottom: 48px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(241, 213, 138, 0.26);
      border-radius: var(--radius);
      min-height: min(720px, calc(100vh - 64px));
      background:
        linear-gradient(120deg, rgba(13, 26, 45, 0.2), rgba(13, 26, 45, 0.78)),
        var(--parchment);
      box-shadow: var(--shadow);
    }

    .hero-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      color: var(--ink);
    }

    .hero-content {
      position: relative;
      display: grid;
      align-content: end;
      min-height: min(720px, calc(100vh - 64px));
      padding: clamp(28px, 6vw, 70px);
      background: linear-gradient(to top, rgba(13, 26, 45, 0.96), rgba(13, 26, 45, 0.74) 45%, rgba(13, 26, 45, 0.2));
    }

    .kicker {
      display: inline-flex;
      width: max-content;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--gold-2);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .kicker::before {
      width: 38px;
      height: 1px;
      background: currentColor;
      content: "";
    }

    .hero h1 {
      max-width: 900px;
      margin-bottom: 14px;
      color: #fff8e8;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 10vw, 8.4rem);
      font-weight: 700;
      line-height: 0.86;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subtitle {
      max-width: 720px;
      margin-bottom: 28px;
      color: rgba(255, 248, 232, 0.86);
      font-size: clamp(1rem, 2vw, 1.35rem);
      line-height: 1.55;
      text-wrap: balance;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(241, 213, 138, 0.24);
      border-radius: var(--radius);
      padding: 12px 18px;
      color: var(--ivory);
      background: rgba(255, 248, 232, 0.08);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .btn svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(241, 213, 138, 0.5);
      background: rgba(255, 248, 232, 0.14);
    }

    .btn-primary {
      border-color: rgba(241, 213, 138, 0.7);
      color: #1b2333;
      background: linear-gradient(180deg, #f4d98d, #c89b3c);
      font-weight: 800;
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #ffe8a9, #d2a346);
      color: #1b2333;
    }

    .btn-copper {
      border-color: rgba(188, 107, 66, 0.72);
      background: linear-gradient(180deg, #bc6b42, #8b4b30);
      color: #fff8e8;
      font-weight: 800;
    }

    .btn-quiet {
      border-color: transparent;
      background: rgba(255, 248, 232, 0.04);
    }

    .view-header {
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(241, 213, 138, 0.38);
      border-radius: 50%;
      color: var(--gold-2);
      background: rgba(255, 248, 232, 0.08);
    }

    .brand-mark svg {
      width: 28px;
      height: 28px;
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title h2 {
      margin-bottom: 1px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.35rem, 4vw, 2.1rem);
      line-height: 1;
    }

    .brand-title p {
      margin: 0;
      color: rgba(255, 248, 232, 0.66);
      font-size: 0.92rem;
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
      gap: 18px;
      align-items: start;
    }

    .main-column,
    .side-column {
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid rgba(241, 213, 138, 0.24);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 248, 232, 0.09), rgba(255, 248, 232, 0.045)),
        rgba(13, 26, 45, 0.8);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
    }

    .panel-pad {
      padding: 18px;
    }

    .map-panel {
      overflow: hidden;
      background: var(--parchment);
      color: var(--ink);
    }

    .map-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(37, 48, 68, 0.14);
      color: var(--ink);
      background: rgba(255, 248, 232, 0.62);
    }

    .era-chip {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 9px;
      color: var(--ink);
      font-weight: 800;
    }

    .era-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .era-dot {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      border: 2px solid #fff8e8;
      border-radius: 50%;
      background: var(--copper);
      box-shadow: 0 0 0 3px rgba(154, 86, 52, 0.22);
    }

    .progress-meter {
      width: min(270px, 42vw);
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(37, 48, 68, 0.14);
    }

    .progress-meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--olive), var(--gold), var(--copper));
      transition: width 360ms ease;
    }

    .journey-map {
      display: block;
      width: 100%;
      min-height: 360px;
      max-height: 560px;
      aspect-ratio: 16 / 9;
      background: var(--parchment);
    }

    .map-label {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20px;
      font-weight: 700;
      fill: #253044;
      paint-order: stroke;
      stroke: rgba(255, 248, 232, 0.8);
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .map-note {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      fill: rgba(37, 48, 68, 0.66);
    }

    .route-base {
      fill: none;
      stroke: rgba(37, 48, 68, 0.24);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 12;
    }

    .route-active {
      fill: none;
      stroke: url(#routeGradient);
      stroke-dasharray: 100;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 7;
      transition: stroke-dashoffset 520ms ease;
    }

    .river {
      fill: none;
      stroke: rgba(45, 96, 119, 0.48);
      stroke-dasharray: 12 10;
      stroke-linecap: round;
      stroke-width: 7;
      animation: riverFlow 14s linear infinite;
    }

    .cloud {
      opacity: 0.28;
      animation: drift 26s ease-in-out infinite alternate;
    }

    .marker-completed .marker-ring {
      fill: rgba(200, 155, 60, 0.28);
      stroke: rgba(200, 155, 60, 0.95);
    }

    .marker-current .marker-ring {
      fill: rgba(154, 86, 52, 0.27);
      stroke: #9a5634;
      filter: url(#glow);
    }

    .marker-pending .marker-ring {
      fill: rgba(255, 248, 232, 0.34);
      stroke: rgba(37, 48, 68, 0.28);
    }

    .marker-pin {
      fill: #fff8e8;
      stroke: rgba(37, 48, 68, 0.35);
      stroke-width: 2;
    }

    .player-marker {
      filter: url(#glow);
      transition: transform 520ms ease;
    }

    .challenge-panel h3,
    .daily-card h3,
    .ending-card h3 {
      margin-bottom: 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.45rem, 4vw, 2.2rem);
      line-height: 1.04;
    }

    .eyebrow {
      margin-bottom: 9px;
      color: var(--gold-2);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .prompt {
      color: rgba(255, 248, 232, 0.9);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .group-note {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 14px 0;
      padding: 12px;
      border-left: 3px solid var(--gold);
      border-radius: var(--radius);
      color: #fff7db;
      background: rgba(82, 102, 59, 0.25);
    }

    .group-note svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      color: var(--gold-2);
    }

    .option-grid {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .choice {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 56px;
      padding: 12px;
      border: 1px solid rgba(241, 213, 138, 0.2);
      border-radius: var(--radius);
      color: var(--ivory);
      text-align: left;
      background: rgba(255, 248, 232, 0.075);
    }

    .choice:hover {
      border-color: rgba(241, 213, 138, 0.5);
      background: rgba(255, 248, 232, 0.13);
    }

    .choice-icon {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      color: var(--gold-2);
      background: rgba(13, 26, 45, 0.48);
    }

    .choice-icon svg,
    .mini-icon {
      width: 18px;
      height: 18px;
    }

    .choice strong {
      display: block;
      color: #fff8e8;
      font-size: 0.98rem;
      line-height: 1.25;
    }

    .choice small {
      display: block;
      margin-top: 3px;
      color: rgba(255, 248, 232, 0.62);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .choice .arrow {
      color: rgba(241, 213, 138, 0.72);
    }

    .result-band {
      display: grid;
      gap: 14px;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid rgba(241, 213, 138, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 248, 232, 0.07);
    }

    .result-band p {
      margin-bottom: 0;
      color: rgba(255, 248, 232, 0.86);
      line-height: 1.55;
    }

    .discovery {
      border-left: 3px solid var(--gold);
      padding: 2px 0 2px 13px;
    }

    .discovery strong {
      display: block;
      color: var(--gold-2);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .reflection {
      border-color: rgba(126, 143, 91, 0.58);
      background: rgba(82, 102, 59, 0.2);
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .stats-grid {
      display: grid;
      gap: 10px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: minmax(92px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .stat-row label {
      color: rgba(255, 248, 232, 0.88);
      font-size: 0.88rem;
      font-weight: 750;
    }

    .stat-value {
      color: var(--gold-2);
      font-size: 0.84rem;
      font-weight: 900;
    }

    .bar {
      grid-column: 1 / -1;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 248, 232, 0.12);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--olive-2), var(--gold), var(--copper));
      transition: width 320ms ease;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h3 {
      margin: 0;
      color: #fff8e8;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.15rem;
    }

    .count-pill {
      display: inline-flex;
      min-width: 32px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(241, 213, 138, 0.26);
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--gold-2);
      font-size: 0.8rem;
      font-weight: 900;
      background: rgba(255, 248, 232, 0.07);
    }

    .stamp-grid,
    .seal-grid,
    .discovery-list {
      display: grid;
      gap: 8px;
    }

    .stamp {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 40px;
      border: 1px dashed rgba(241, 213, 138, 0.22);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: rgba(255, 248, 232, 0.68);
      background: rgba(255, 248, 232, 0.045);
    }

    .stamp.done {
      border-style: solid;
      border-color: rgba(200, 155, 60, 0.5);
      color: #fff8e8;
      background: rgba(200, 155, 60, 0.13);
    }

    .stamp-mark {
      color: var(--gold-2);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .wax-seal {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      min-height: 52px;
      border-radius: var(--radius);
      padding: 8px;
      background: rgba(255, 248, 232, 0.06);
    }

    .wax-seal svg {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
    }

    .wax-seal strong {
      color: #fff8e8;
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .wax-seal span {
      color: rgba(255, 248, 232, 0.58);
      font-size: 0.78rem;
    }

    .seal-empty {
      color: rgba(255, 248, 232, 0.6);
      line-height: 1.45;
    }

    .discovery-item {
      border-left: 2px solid rgba(241, 213, 138, 0.5);
      padding-left: 10px;
      color: rgba(255, 248, 232, 0.78);
      font-size: 0.86rem;
      line-height: 1.42;
    }

    .leader-guide details {
      border-top: 1px solid rgba(255, 248, 232, 0.12);
      padding: 10px 0;
    }

    .leader-guide details:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .leader-guide summary {
      cursor: pointer;
      color: #fff8e8;
      font-weight: 800;
      list-style: none;
    }

    .leader-guide summary::-webkit-details-marker {
      display: none;
    }

    .guide-content {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      color: rgba(255, 248, 232, 0.75);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .guide-content strong {
      color: var(--gold-2);
    }

    .how-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
      gap: 18px;
      align-items: start;
    }

    .rules-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .rules-list li {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start;
      min-height: 46px;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255, 248, 232, 0.06);
    }

    .rule-number {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 1px solid rgba(241, 213, 138, 0.32);
      border-radius: 50%;
      color: var(--gold-2);
      font-weight: 900;
    }

    .virtue-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .virtue-token {
      border: 1px solid rgba(241, 213, 138, 0.25);
      border-radius: 999px;
      padding: 8px 10px;
      color: #fff8e8;
      background: rgba(255, 248, 232, 0.07);
      font-weight: 800;
    }

    .daily-focus {
      display: grid;
      gap: 12px;
      grid-template-columns: auto 1fr;
      align-items: center;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(200, 155, 60, 0.13);
    }

    .daily-focus .brand-mark {
      width: 58px;
      height: 58px;
      background: rgba(154, 86, 52, 0.22);
    }

    .final-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(310px, 420px);
      gap: 18px;
      align-items: start;
    }

    .summary-card {
      overflow: hidden;
      border: 1px solid rgba(241, 213, 138, 0.36);
      border-radius: var(--radius);
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 248, 232, 0.86), rgba(255, 248, 232, 0.9)),
        var(--parchment);
      box-shadow: var(--shadow);
    }

    .summary-art {
      position: relative;
      min-height: 170px;
      background: #e7d2a6;
    }

    .summary-art svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .summary-body {
      padding: 18px;
    }

    .summary-card h3 {
      margin-bottom: 6px;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      line-height: 1;
    }

    .summary-card p {
      color: #514534;
      line-height: 1.5;
    }

    .verse {
      margin: 16px 0 0;
      padding: 14px;
      border-left: 4px solid var(--copper);
      color: #352c20;
      background: rgba(255, 248, 232, 0.66);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .score-table {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .score-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      color: rgba(255, 248, 232, 0.86);
    }

    .empty-state {
      color: rgba(255, 248, 232, 0.62);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @keyframes drift {
      from { transform: translateX(-16px); }
      to { transform: translateX(20px); }
    }

    @keyframes riverFlow {
      from { stroke-dashoffset: 0; }

    const baseScores = () => virtues.reduce((scores, virtue) => {

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function todaysFocus() {
      const start = new Date(new Date().getFullYear(), 0, 0);
      const today = new Date();
      const day = Math.floor((today - start) / 86400000);
      return virtues[day % virtues.length];
    }

    function startJourney(mode) {
      state = {
        screen: "game",
        mode,
        eraIndex: 0,
        phase: "challenge",
        scores: baseScores(),
        stamps: [],
        discoveries: [],
        seals: [],
        selectedChallenges: eras.map(era => pick(era.challenges)),
        lastOutcome: null,
        pendingEvent: null,
        dailyFocus: null,
        dailyResult: null
      };
      render();
    }

    function startDaily() {
      state = {
        ...state,
        screen: "daily",
        mode: "daily",
        scores: baseScores(),
        dailyFocus: todaysFocus(),
        dailyResult: null
      };
      render();
    }

    function showHowToPlay() {
      state = { ...state, screen: "how" };
      render();
    }

    function goHome() {
      state = { ...state, screen: "home" };
      render();
    }

    function addDiscovery(text) {
      if (!text || state.discoveries.includes(text)) return text;
      state.discoveries.push(text);
      return text;
    }

    function applyVirtues(impacts) {
      Object.entries(impacts || {}).forEach(([virtue, value]) => {
        state.scores[virtue] = Math.max(0, (state.scores[virtue] || 0) + value);
      });
      unlockSeals();
    }

    function unlockSeals() {
      virtues.forEach(virtue => {
        if (state.scores[virtue] >= 6 && !state.seals.includes(virtue)) {
          state.seals.push(virtue);
        }
      });
    }

    function choiceVirtueLine(choice) {
      return Object.entries(choice.virtues)
        .map(([virtue, value]) => `${virtue} +${value}`)
        .join(" | ");
    }

    function chooseOption(index) {
      const era = eras[state.eraIndex];
      const challenge = state.selectedChallenges[state.eraIndex];
      const choice = challenge.options[index];
      if (!choice) return;
      applyVirtues(choice.virtues);
      if (!state.stamps.includes(era.name)) state.stamps.push(era.name);
      const discovery = addDiscovery(pick(era.discoveryPool));
      state.pendingEvent = Math.random() < 0.34 && state.eraIndex < eras.length - 1 ? pick(randomEvents) : null;
      state.lastOutcome = {
        title: challenge.title,
        choice: choice.text,
        feedback: choice.feedback,
        note: choice.note,
        discovery,
        stamp: era.name,
        impacts: choice.virtues
      };
      state.phase = "result";
      render();
    }

    function continueAfterResult() {
      if (state.pendingEvent) {
        state.phase = "event";
      } else if (shouldReflect()) {
        state.phase = "reflection";
      } else {
        advanceEra();
        return;
      }
      render();
    }

    function chooseEventOption(index) {
      const event = state.pendingEvent;
      if (!event) return;
      const choice = event.options[index];
      if (!choice) return;
      applyVirtues(choice.virtues);
      const discovery = addDiscovery(event.discovery);
      state.lastOutcome = {
        title: event.title,
        choice: choice.text,
        feedback: choice.feedback,
        note: "A road event shaped the journey.",
        discovery,
        stamp: null,
        impacts: choice.virtues
      };
      state.pendingEvent = null;
      state.phase = shouldReflect() ? "reflection" : "result";
      render();
    }

    function shouldReflect() {
      return [2, 4, 6, 7].includes(state.eraIndex);
    }

    function skipReflection() {
      advanceEra();
    }

    function advanceEra() {
      if (state.eraIndex >= eras.length - 1) {
        finishJourney();
        return;
      }
      state.eraIndex += 1;
      state.phase = "challenge";
      state.lastOutcome = null;
      state.pendingEvent = null;
      render();
    }

    function finishJourney() {
      unlockSeals();
      state.screen = "ending";
      state.phase = "complete";
      state.pendingEvent = null;
      render();
    }

    function chooseDailyOption(index) {
      const challenge = dailyChallenges[state.dailyFocus];
      const choice = challenge.options[index];
      if (!choice) return;
      applyVirtues(choice.virtues);
      state.dailyResult = {
        focus: state.dailyFocus,
        choice: choice.text,
        feedback: choice.feedback,
        discovery: challenge.discovery
      };
      render();
    }

      const max = Math.max(...virtues.map(virtue => state.scores[virtue]));
      return virtues.filter(virtue => state.scores[virtue] === max);

    function attachEvents() {
      app.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => {
          const action = button.getAttribute("data-action");
          const value = button.getAttribute("data-value");
          if (action === "solo") startJourney("solo");
          if (action === "group") startJourney("group");
          if (action === "daily") startDaily();
          if (action === "how") showHowToPlay();
          if (action === "home") goHome();
          if (action === "choice") chooseOption(Number(value));
          if (action === "continue") continueAfterResult();
          if (action === "eventChoice") chooseEventOption(Number(value));
          if (action === "skipReflection") skipReflection();
          if (action === "continueReflection") advanceEra();
          if (action === "dailyChoice") chooseDailyOption(Number(value));
          if (action === "restart") startJourney(state.mode === "group" ? "group" : "solo");
          if (action === "print") window.print();
        });
      });
    }

      return `
        <section class="panel panel-pad challenge-panel" aria-labelledby="result-title">
          <div class="eyebrow">Journey Discovery</div>
          <h3 id="result-title">${escapeHtml(result.title)}</h3>
          <div class="result-band">
            <p><strong>Your choice:</strong> ${escapeHtml(result.choice)}</p>
            <p>${escapeHtml(result.feedback)}</p>
            <p>${escapeHtml(result.note)}</p>
            ${result.stamp ? `<p><strong>Passport stamp added:</strong> ${escapeHtml(result.stamp)}</p>` : ""}
            <div class="discovery">
              <strong>Did you know?</strong>
              <p>${escapeHtml(result.discovery)}</p>
            </div>
          </div>
          <div class="action-row">
            <button class="btn btn-primary" data-action="continue">${icons.arrow} ${continueLabel}</button>
          </div>
        </section>
      `;
    }

    function renderEventPanel() {
      const event = state.pendingEvent;
      return `
        <section class="panel panel-pad challenge-panel" aria-labelledby="event-title">
          <div class="eyebrow">Road Event</div>
          <h3 id="event-title">${escapeHtml(event.title)}</h3>
          <p class="prompt">${escapeHtml(event.prompt)}</p>
          ${state.mode === "group" ? `
            <div class="group-note">
              ${icons.group}
              <div>
                <strong>Discuss together before choosing.</strong><br>
                What virtue does this moment ask your group to practice?
              </div>
            </div>
          ` : ""}
          <div class="option-grid">
            ${event.options.map((choice, index) => renderChoice(choice, index, "eventChoice")).join("")}
          </div>
        </section>
      `;
    }

    function renderReflectionPanel() {
      const era = eras[state.eraIndex];
      return `
        <section class="panel panel-pad challenge-panel" aria-labelledby="reflection-title">
          <div class="eyebrow">Optional Reflection</div>
          <h3 id="reflection-title">${escapeHtml(era.name)} Reflection</h3>
          <div class="result-band reflection">
            <p>${escapeHtml(era.reflection)}</p>
          </div>
          <div class="action-row">
            <button class="btn btn-primary" data-action="continueReflection">${icons.arrow} Continue</button>
            <button class="btn" data-action="skipReflection">Skip</button>
          </div>
        </section>
      `;
    }

    function renderVirtuePanel() {
      const max = Math.max(12, ...Object.values(state.scores), 1);
      return `
        <section class="panel panel-pad" aria-labelledby="virtue-score-title">
          <div class="section-title">
            <h3 id="virtue-score-title">Virtue Scores</h3>
            <span class="count-pill">${state.stamps.length}/${eras.length}</span>
          </div>
          <div class="stats-grid">
            ${virtues.map(virtue => {
              const score = state.scores[virtue] || 0;
              const width = Math.min(100, Math.round((score / max) * 100));
              return `
                <div class="stat-row">
                  <label>${virtue}</label>
                  <span class="stat-value">${score}</span>
                  <div class="bar" aria-hidden="true"><span style="width: ${width}%"></span></div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderPassportPanel() {
      return `
        <section class="panel panel-pad" aria-labelledby="passport-title">
          <div class="section-title">
            <h3 id="passport-title">Journey Passport</h3>
            <span class="count-pill">${state.stamps.length}</span>
          </div>
          <div class="stamp-grid">
            ${eras.map(era => {
              const done = state.stamps.includes(era.name);
              return `
                <div class="stamp ${done ? "done" : ""}">
                  <span>${escapeHtml(era.name)}</span>
                  <span class="stamp-mark">${done ? "Stamped" : "Open"}</span>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderSealsPanel() {
      return `
        <section class="panel panel-pad" aria-labelledby="seals-title">
          <div class="section-title">
            <h3 id="seals-title">Wax Seals</h3>
            <span class="count-pill">${state.seals.length}</span>
          </div>
          <div class="seal-grid">
            ${state.seals.length ? state.seals.map(virtue => waxSealMarkup(virtue)).join("") : `<p class="seal-empty">Seals are earned as virtue strengths emerge during the journey.</p>`}
          </div>
        </section>
      `;
    }

    function renderDiscoveriesPanel() {
      const visible = state.discoveries.slice(-4);
      return `
        <section class="panel panel-pad" aria-labelledby="discoveries-title">
          <div class="section-title">
            <h3 id="discoveries-title">Discoveries</h3>
            <span class="count-pill">${state.discoveries.length}</span>
          </div>
          <div class="discovery-list">
            ${visible.length ? visible.map(item => `<div class="discovery-item">${escapeHtml(item)}</div>`).join("") : `<p class="empty-state">Discoveries unlock as the journey unfolds.</p>`}
          </div>
        </section>
      `;
    }

    function renderLeaderGuide(currentName) {
      return `
        <section class="panel panel-pad leader-guide" aria-labelledby="leader-title">
          <div class="section-title">
            <h3 id="leader-title">Leader Guide</h3>
            <span class="count-pill">${eras.length}</span>
          </div>
          ${eras.map(era => `
            <details ${era.name === currentName ? "open" : ""}>
              <summary>${escapeHtml(era.name)}</summary>
              <div class="guide-content">
                <div><strong>References:</strong> ${escapeHtml(era.references)}</div>
                <div><strong>Main lesson:</strong> ${escapeHtml(era.lesson)}</div>
                <div><strong>Discussion:</strong> ${escapeHtml(era.discussion.join(" "))}</div>
                <div><strong>Prayer:</strong> ${escapeHtml(era.prayer)}</div>
              </div>
            </details>
          `).join("")}
        </section>
      `;
    }

    function renderDaily() {
      const focus = state.dailyFocus || todaysFocus();
      const challenge = dailyChallenges[focus];
      const result = state.dailyResult;
      return `
        <main class="screen">
          ${renderHeader("Daily Challenge", "A focused practice for today")}
          <section class="how-grid">
            <div class="panel panel-pad daily-card" aria-labelledby="daily-title">
              <div class="daily-focus">
                <div class="brand-mark">${icons.spark}</div>
                <div>
                  <div class="eyebrow">Today's Focus</div>
                  <h3 id="daily-title">${escapeHtml(focus)}</h3>
                </div>
              </div>
              ${result ? `
                <div class="result-band">
                  <p><strong>Your choice:</strong> ${escapeHtml(result.choice)}</p>
                  <p>${escapeHtml(result.feedback)}</p>
                  <div class="discovery">
                    <strong>Did you know?</strong>
                    <p>${escapeHtml(result.discovery)}</p>
                  </div>
                </div>
                <div class="action-row">
                  <button class="btn btn-primary" data-action="solo">${icons.compass} Begin Full Journey</button>
                  <button class="btn" data-action="home">Opening</button>
                </div>
              ` : `
                <p class="prompt">${escapeHtml(challenge.prompt)}</p>
                <div class="option-grid">
                  ${challenge.options.map((choice, index) => renderChoice(choice, index, "dailyChoice")).join("")}
                </div>
              `}
            </div>
            <aside class="panel panel-pad">
              <div class="section-title">
                <h3>Virtue Practice</h3>
                <span class="count-pill">Today</span>
              </div>
              <p class="prompt">${escapeHtml(virtueDescriptions[focus])}</p>
              <div class="verse">${escapeHtml(virtueVerses[focus])}</div>
            </aside>
          </section>
        </main>
      `;
    }

    function renderEnding() {
      const strongest = strongestVirtues();
      const primary = strongest[0];
      const completed = state.stamps.length;
      return `
        <main class="screen">
          ${renderHeader("Journey Complete", "Your Faith Profile is ready")}
          <section class="final-grid">
            <div class="main-column ending-card">
              <section class="panel panel-pad challenge-panel">
                <div class="eyebrow">Faith Profile</div>
                <h3>Your Strongest Virtue: ${escapeHtml(strongest.join(" and "))}</h3>
                <p class="prompt">${escapeHtml(virtueDescriptions[primary])}</p>
                <div class="score-table">
                  ${virtues.map(virtue => `
                    <div class="score-line">
                      <span>${virtue}</span>
                      <strong>${state.scores[virtue]}</strong>
                    </div>
                  `).join("")}
                </div>
                <div class="result-band">
                  <p><strong>Passport completion:</strong> ${completed}/${eras.length} eras stamped.</p>
                  <p><strong>Seals earned:</strong> ${state.seals.length ? state.seals.map(v => `Seal of ${v}`).join(", ") : "Your strongest seal is still forming."}</p>
                  <p><strong>Discoveries found:</strong> ${state.discoveries.length}</p>
                </div>
                <div class="action-row">
                  <button class="btn btn-primary" data-action="restart">${icons.route} Replay Journey</button>
                  <button class="btn" data-action="print">${icons.spark} Print Summary</button>
                  <button class="btn" data-action="home">Opening</button>
                </div>
              </section>
              ${renderVirtuePanel()}
              ${renderSealsPanel()}
            </div>
            <aside class="summary-card" aria-label="Shareable results card">
              <div class="summary-art">${summaryMapSvg()}</div>
              <div class="summary-body">
                <div class="eyebrow" style="color:#7a4b2f">Journey Completed</div>
                <h3>Bible Journey Challenge</h3>
                <p><strong>Strongest virtue:</strong> ${escapeHtml(strongest.join(" and "))}</p>
                <p><strong>Passport:</strong> ${completed}/${eras.length} eras complete</p>
                <p><strong>Wax seals:</strong> ${state.seals.length ? state.seals.map(v => `Seal of ${v}`).join(", ") : "Still forming"}</p>
                <div class="verse">${escapeHtml(virtueVerses[primary])}</div>
              </div>
            </aside>
          </section>
        </main>
      `;
    }

    function waxSealMarkup(virtue) {
      return `
        <div class="wax-seal earned">
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <defs>
              <radialGradient id="seal-${virtue}" cx="40%" cy="35%" r="65%">
                <stop offset="0" stop-color="#cf7850"/>
                <stop offset="0.62" stop-color="#9a5634"/>
                <stop offset="1" stop-color="#6c3324"/>
              </radialGradient>
            </defs>
            <path d="M50 6 59 18 74 14 77 29 91 36 84 50 91 64 77 71 74 86 59 82 50 94 41 82 26 86 23 71 9 64 16 50 9 36 23 29 26 14 41 18 50 6Z" fill="url(#seal-${virtue})"/>
            <circle cx="50" cy="50" r="26" fill="none" stroke="#f1d58a" stroke-width="3" opacity=".8"/>
            <text x="50" y="57" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#fff8e8">${virtue[0]}</text>
          </svg>
          <span><strong>Seal of ${virtue}</strong><br><span>Earned through choices</span></span>
        </div>
      `;
    }

    function heroMapSvg() {
      return `
        <svg class="hero-map" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <linearGradient id="heroPaper" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#f2e3bf"/>
              <stop offset="0.56" stop-color="#ddc28a"/>
              <stop offset="1" stop-color="#b99363"/>
            </linearGradient>
            <filter id="heroSoft"><feGaussianBlur stdDeviation="0.8"/></filter>
          </defs>
          <rect width="1200" height="760" fill="url(#heroPaper)"/>
          <path d="M61 481C167 354 266 301 386 323c65 12 108-51 181-41 97 12 145 104 247 81 124-27 199 21 286 130v267H61Z" fill="#9aa36b" opacity=".32"/>
          <path d="M-20 572C90 518 161 530 249 573c80 39 149 21 238-28 96-54 187-38 291 32 94 63 211 81 451-48v231H-20Z" fill="#52663b" opacity=".28"/>
          <path d="M116 388C268 202 395 179 515 281c105 90 217 72 338-19 90-68 183-72 286-21" fill="none" stroke="#3f7384" stroke-width="12" stroke-linecap="round" opacity=".35"/>
          <path d="M90 548C245 458 357 500 457 408S661 254 816 310s215-68 316-166" fill="none" stroke="#8b4b30" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 22" opacity=".58"/>
          <g fill="none" stroke="#7a633f" stroke-width="2" opacity=".42">
            <path d="M221 248 254 193 287 248Z"/>
            <path d="M262 252 309 176 356 252Z"/>
            <path d="M784 196 824 126 864 196Z"/>
            <path d="M835 204 884 121 934 204Z"/>
            <circle cx="978" cy="488" r="74"/>
            <path d="M978 414v148M904 488h148M927 437l102 102M1029 437 927 539"/>
          </g>
          <g class="cloud" fill="#fff8e8" filter="url(#heroSoft)">
            <ellipse cx="238" cy="129" rx="78" ry="18"/>
            <ellipse cx="305" cy="121" rx="55" ry="16"/>
            <ellipse cx="846" cy="94" rx="90" ry="20"/>
            <ellipse cx="925" cy="87" rx="50" ry="16"/>
          </g>
          <g fill="#253044" opacity=".38" font-family="Georgia,serif" font-size="22">
            <text x="145" y="598">Ancient Roads</text>
            <text x="790" y="244">Riverlands</text>
            <text x="944" y="603">Promise Sea</text>
          </g>
        </svg>
      `;
    }

    function routePath() {
      return "M105 350 C150 292 168 268 210 245 C250 225 280 306 315 330 C365 366 388 246 430 215 C476 184 498 278 535 300 C588 339 598 205 640 185 C684 166 694 250 735 285 C778 322 792 195 820 165";
    }

    function journeyMapSvg() {
      const currentPoint = mapPoints[state.eraIndex];
      const routeProgress = Math.max(0, Math.min(100, (state.eraIndex / (eras.length - 1)) * 100));
      const offset = 100 - routeProgress;
      return `
        <svg class="journey-map" viewBox="0 0 900 540" role="img" aria-label="Map showing journey through Scripture eras">
          <defs>
            <linearGradient id="mapPaper" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#f5e8c9"/>
              <stop offset="0.55" stop-color="#e0c895"/>
              <stop offset="1" stop-color="#b99363"/>
            </linearGradient>
            <linearGradient id="routeGradient" x1="0" x2="1">
              <stop offset="0" stop-color="#52663b"/>
              <stop offset="0.58" stop-color="#c89b3c"/>
              <stop offset="1" stop-color="#9a5634"/>
            </linearGradient>
            <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
              <circle cx="8" cy="14" r="1" fill="#7a633f" opacity=".14"/>
              <circle cx="61" cy="23" r="1.2" fill="#7a633f" opacity=".10"/>
              <circle cx="34" cy="61" r="0.9" fill="#7a633f" opacity=".12"/>
            </pattern>
          </defs>
          <rect width="900" height="540" fill="url(#mapPaper)"/>
          <rect width="900" height="540" fill="url(#grain)"/>
          <path d="M0 404C85 330 171 313 270 343c68 20 114-51 187-37 92 18 132 105 234 78 83-22 145-2 209 52v104H0Z" fill="#52663b" opacity=".18"/>
          <path d="M-12 510C93 451 159 458 247 498c77 36 134 8 213-36 98-54 171-34 260 26 58 39 116 49 192 31v21H-12Z" fill="#52663b" opacity=".24"/>
          <path class="river" d="M8 251C78 228 110 173 171 168c74-7 107 63 174 56 83-9 103-113 198-102 82 9 112 96 189 77 53-13 89-67 158-71"/>
          <g fill="none" stroke="#7a633f" stroke-width="2" opacity=".46">
            <path d="M138 208 168 157 198 208Z"/>
            <path d="M185 210 224 141 264 210Z"/>
            <path d="M596 150 633 88 670 150Z"/>
            <path d="M642 156 690 76 738 156Z"/>
            <circle cx="760" cy="420" r="46"/>
            <path d="M760 374v92M714 420h92M727 387l66 66M793 387l-66 66"/>
          </g>
          <g class="cloud" fill="#fff8e8">
            <ellipse cx="176" cy="84" rx="45" ry="12"/>
            <ellipse cx="220" cy="77" rx="33" ry="10"/>
            <ellipse cx="701" cy="53" rx="56" ry="14"/>
            <ellipse cx="748" cy="48" rx="35" ry="10"/>
          </g>
          <path class="route-base" d="${routePath()}"/>
          <path class="route-active" pathLength="100" d="${routePath()}" style="stroke-dashoffset:${offset}"/>
          ${eras.map((era, index) => {
            const point = mapPoints[index];
            const completed = state.stamps.includes(era.name);
            const status = index === state.eraIndex ? "marker-current" : completed ? "marker-completed" : "marker-pending";
            const labelY = point.y + (index % 2 === 0 ? 42 : -32);
            return `
              <g class="${status}" transform="translate(${point.x} ${point.y})">
                <circle class="marker-ring" r="20" stroke-width="3"/>
                <circle class="marker-pin" r="8"/>
              </g>
              <text class="map-label" x="${point.x}" y="${labelY}" text-anchor="middle">${escapeHtml(era.name)}</text>
            `;
          }).join("")}
          <g class="player-marker" transform="translate(${currentPoint.x} ${currentPoint.y - 34})">
            <path d="M0-23C13-23 23-13 23 0c0 17-23 34-23 34S-23 17-23 0c0-13 10-23 23-23Z" fill="#9a5634" stroke="#fff8e8" stroke-width="3"/>
            <circle r="8" fill="#f1d58a"/>
          </g>
          <text class="map-note" x="26" y="510">Journey through Scripture</text>
        </svg>
      `;
    }

    function summaryMapSvg() {
      return `
        <svg viewBox="0 0 520 210" preserveAspectRatio="none" aria-hidden="true">
          <rect width="520" height="210" fill="#e5cf9e"/>
          <path d="M0 151C58 122 107 113 164 130c47 14 78-33 125-24 60 11 85 73 152 54 31-9 56-9 79 2v48H0Z" fill="#52663b" opacity=".28"/>
          <path d="M26 146C94 94 150 116 204 88s113-74 178-38 83-2 120-38" fill="none" stroke="#9a5634" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 15" opacity=".7"/>
          <path d="M24 90C72 77 96 40 137 42c49 3 63 44 111 37 58-8 79-67 139-47 33 11 51 41 104 32" fill="none" stroke="#3f7384" stroke-width="6" stroke-linecap="round" opacity=".28"/>
          <g fill="#9a5634" stroke="#fff8e8" stroke-width="2">
            ${mapPoints.map((point, index) => `<circle cx="${26 + index * 66}" cy="${146 - (index % 2) * 34}" r="8"/>`).join("")}
          </g>
        </svg>
      `;
    }

    render();
  </script>
</body>
</html>
